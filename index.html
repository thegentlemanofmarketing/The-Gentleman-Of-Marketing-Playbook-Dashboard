<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Gentleman of Marketing - Training Dashboard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Phosphor Icons (replaces Lucide for single-file plug-and-play) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX compilation in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.3s ease-out forwards;
    }
    /* Custom Scrollbar for a premium look */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #a98a66; }
  </style>
</head>
<body class="bg-black text-white font-sans antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- REUSABLE COMPONENTS ---
    const Accordion = ({ id, title, subtitle, children, expanded, onToggle }) => (
      <div className="bg-[#111111] border border-gray-800 rounded-sm overflow-hidden mb-4">
        <button 
          onClick={() => onToggle(id)} 
          className="w-full px-6 py-4 flex justify-between items-center hover:bg-[#1a1a1a] transition-colors text-left"
        >
          <div>
            <h3 className="text-xl text-white font-medium">{title}</h3>
            {subtitle && <p className="text-sm text-gray-500 mt-1">{subtitle}</p>}
          </div>
          {expanded === id 
            ? <i className="ph ph-caret-down text-[#a98a66] text-xl flex-shrink-0 ml-4"></i> 
            : <i className="ph ph-caret-right text-gray-500 text-xl flex-shrink-0 ml-4"></i>
          }
        </button>
        {expanded === id && (
          <div className="px-6 pb-6 pt-2 text-gray-300 border-t border-gray-800 animate-fadeIn space-y-4">
            {children}
          </div>
        )}
      </div>
    );

    const SectionHeader = ({ title, description }) => (
      <div className="mb-8">
        <h2 className="text-3xl font-light text-white mb-2">{title}</h2>
        <p className="text-[#a98a66] text-lg">{description}</p>
      </div>
    );

    // --- MAIN APP COMPONENT ---
    const App = () => {
      const [activeTab, setActiveTab] = useState('overview');
      const [expandedAccordion, setExpandedAccordion] = useState(null);

      // --- AI Tools State ---
      const [aiMode, setAiMode] = useState('post'); // 'post' or 'roleplay'
      const [isLoading, setIsLoading] = useState(false);
      const [aiResult, setAiResult] = useState('');
      const [userApiKey, setUserApiKey] = useState(''); // Allows user to input key locally

      // Post Gen State
      const [targetAudience, setTargetAudience] = useState('');
      const [desiredOutcome, setDesiredOutcome] = useState('');

      // Roleplay State
      const [objection, setObjection] = useState('');
      const [rebuttal, setRebuttal] = useState('');

      // --- Gemini API Logic ---
      const fetchWithBackoff = async (url, options, retries = 5, delay = 1000) => {
        try {
          const response = await fetch(url, options);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          return await response.json();
        } catch (error) {
          if (retries > 0) {
            await new Promise(res => setTimeout(res, delay));
            return fetchWithBackoff(url, options, retries - 1, delay * 2);
          }
          throw error;
        }
      };

      const callGemini = async (prompt, systemInstruction) => {
        // Uses user-provided key if running locally, otherwise fallbacks to environment injected key
        const apiKey = userApiKey || ""; 
        
        if (!apiKey) {
           return "Error: Please enter a valid Gemini API Key to use this feature.";
        }

        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
          contents: [{ parts: [{ text: prompt }] }],
          systemInstruction: { parts: [{ text: systemInstruction }] }
        };
        const data = await fetchWithBackoff(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
      };

      const handleGeneratePost = async () => {
        if (!targetAudience || !desiredOutcome) return;
        setIsLoading(true);
        setAiResult('');
        try {
          const prompt = `Target Audience: ${targetAudience}\nDesired Outcome: ${desiredOutcome}`;
          const sysInfo = `You are an expert copywriter for 'The Gentleman of Marketing'. Write 3 different 'Hand Raiser' social media posts.
          Rules:
          1. Max 3 sentences per post.
          2. Focus ONLY on the outcome ("So What?"), not the technical process.
          3. End with a simple call to action to drop a comment or DM.
          4. Make them punchy, irresistible, and conversational.
          5. Format output with clear headings for each option. Keep formatting clean and professional without excessive markdown.`;
          const res = await callGemini(prompt, sysInfo);
          setAiResult(res);
        } catch (err) {
          setAiResult("Error connecting to AI. Please check your API key and try again.");
        }
        setIsLoading(false);
      };

      const handleAnalyzeRebuttal = async () => {
        if (!objection || !rebuttal) return;
        setIsLoading(true);
        setAiResult('');
        try {
          const prompt = `Prospect's Objection: "${objection}"\nMy Rebuttal: "${rebuttal}"`;
          const sysInfo = `You are a master sales trainer for 'The Gentleman of Marketing'.
          Evaluate the trainee's rebuttal based on the '6-Step Disarm Process' (1. Acknowledge, 2. Dig, 3. Isolate, 4. Overcome, 5. Vision, 6. Ask for Sale).
          Provide:
          1. A score out of 10.
          2. What they did well.
          3. Where they missed the mark (did they get defensive? did they fail to ask a question? did they skip acknowledging?).
          4. An improved, 'Gentleman of Marketing' approved response that uses a 'Flip' or proper disarm framework.`;
          const res = await callGemini(prompt, sysInfo);
          setAiResult(res);
        } catch (err) {
          setAiResult("Error connecting to AI. Please check your API key and try again.");
        }
        setIsLoading(false);
      };

      const handleTabChange = (id) => {
        setActiveTab(id);
        setExpandedAccordion(null);
      };

      const toggleAccordion = (id) => {
        setExpandedAccordion(expandedAccordion === id ? null : id);
      };

      const NavItem = ({ id, icon, label }) => (
        <button
          onClick={() => handleTabChange(id)}
          className={`w-full flex items-center space-x-3 px-4 py-3 text-left transition-all duration-200 border-l-4 ${
            activeTab === id 
              ? 'bg-[#1a1a1a] border-[#a98a66] text-[#a98a66]' 
              : 'border-transparent text-gray-400 hover:bg-[#111111] hover:text-white'
          }`}
        >
          <i className={`${icon} text-xl`}></i>
          <span className="font-medium tracking-wide">{label}</span>
        </button>
      );

      // --- RENDER SECTIONS ---

      const renderOverview = () => (
        <div className="space-y-8 animate-fadeIn">
          <div className="bg-[#111111] border border-[#a98a66]/30 p-8 rounded-sm">
            <h2 className="text-3xl font-light text-white mb-4">
              Rest in Peace, <span className="text-[#a98a66] font-semibold">Old Sales Tactics</span>
            </h2>
            <p className="text-gray-300 text-lg leading-relaxed mb-6">
              The old way of selling is dead. If you're still relying on high-pressure, gross manipulation tactics, that stops now. 
              Selling is simply <strong className="text-[#a98a66]">matchmaking</strong>. It's taking someone's problems and recommending a solution to them.
            </p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
              <div className="bg-black p-6 border border-gray-800 rounded-sm">
                <i className="ph ph-target text-[#a98a66] text-3xl mb-4 block"></i>
                <h3 className="text-xl font-semibold text-white mb-2">The Goal</h3>
                <p className="text-gray-400">Ask good questions, smile, and deeply understand their wants and needs before ever pitching. Focus on the 97% of the market gathering information, not just the 3% ready to buy.</p>
              </div>
              <div className="bg-black p-6 border border-gray-800 rounded-sm">
                <i className="ph ph-check-circle text-[#a98a66] text-3xl mb-4 block"></i>
                <h3 className="text-xl font-semibold text-white mb-2">The Rule</h3>
                <p className="text-gray-400">You must believe in what you sell. Shift from a "service-led" approach (explaining tech jargon) to a "promise-led" approach (delivering outcomes).</p>
              </div>
            </div>
          </div>
        </div>
      );

      const renderProspecting = () => (
        <div className="space-y-2 animate-fadeIn">
          <SectionHeader 
            title="Prospecting & Lead Gen" 
            description="Mastering outreach across LinkedIn, Cold Email, Calls, and Inbound strategies." 
          />

          <Accordion id="p-linkedin" title="LinkedIn Outreach Strategy" subtitle="Connection requests, follow-ups, and Boolean search" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <div className="bg-black p-4 border-l-4 border-[#a98a66] text-sm mb-4">
              <strong>Boolean Search Hacks:</strong> Use AND/OR/NOT to gain an unfair advantage. <br/>
              <span className="font-mono text-gray-400 block mt-2">("real estate agent" OR "real estate broker") NOT "commercial"</span>
              <span className="font-mono text-gray-400 block mt-1">("phd" OR "doctor" OR "dr") NOT "psychologist"</span>
            </div>
            <h4 className="text-white font-semibold mt-4 mb-2">1. Connection Requests (Keep it short)</h4>
            <ul className="list-disc pl-5 text-gray-400 space-y-2 mb-4">
              <li>"Hi [Name], I noticed we have a few connections in common. I’m always looking to expand my network, let’s connect!"</li>
              <li>"Hi [Name], I came across your profile and I’m always looking to network with other professionals in [industry]. Let’s connect!"</li>
            </ul>
            <h4 className="text-white font-semibold mb-2">2. The 3-Step Follow-Up</h4>
            <div className="space-y-3 text-sm">
              <div className="bg-black p-3 rounded border border-gray-800">
                <strong className="text-[#a98a66]">Touch 1 (Day 1):</strong> "Appreciate the connection! I work with a lot of companies like yours, helping them get 10x more revenue. I’d be happy to be a resource for you..."
              </div>
              <div className="bg-black p-3 rounded border border-gray-800">
                <strong className="text-[#a98a66]">Touch 2 (Day 7):</strong> "Hey [Name], I'm sure you know companies like yours need a consistent stream of high-quality leads. We’ve written this new e-book all about [Topic]. Here's the link..."
              </div>
              <div className="bg-black p-3 rounded border border-gray-800">
                <strong className="text-[#a98a66]">Touch 3 (No Response):</strong> "Hi [Name], I don’t want to be that pushy salesperson that floods your inbox. I really feel there is some synergy between us. Here’s my calendar link to book a time..."
              </div>
            </div>
          </Accordion>

          <Accordion id="p-email" title="The 7-Touch Cold Email Sequence" subtitle="A structured campaign to convert cold leads" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
              <div className="bg-black p-4 rounded border border-gray-800">
                <strong className="text-white">1. Intro:</strong> "Just finished [Service] for [Client], resulting in [Metrics]. Is this something you're interested in?"
              </div>
              <div className="bg-black p-4 rounded border border-gray-800">
                <strong className="text-white">2. More Advantages:</strong> "Today I want to tell you about one aspect of the strategy. This step alone can make or break your campaign..."
              </div>
              <div className="bg-black p-4 rounded border border-gray-800">
                <strong className="text-white">3. Handling Objection:</strong> "But [Objection]? That's the response I get from many. Here's the thing..."
              </div>
              <div className="bg-black p-4 rounded border border-gray-800">
                <strong className="text-white">4. Adding Value:</strong> "Tips for achieving [Results]. You can implement this yourself if you do it the right way..."
              </div>
              <div className="bg-black p-4 rounded border border-gray-800">
                <strong className="text-white">5. Soft Sell:</strong> "If every day you find yourself with [Pain 1] and [Pain 2], then this offer is for you..."
              </div>
              <div className="bg-black p-4 rounded border border-gray-800">
                <strong className="text-white">6. Aggressive Sell:</strong> "I want to tell you the story of [Client 1]... Does it make sense if we talk about how to attack [Problem]?"
              </div>
              <div className="bg-black p-4 rounded border border-[#a98a66] md:col-span-2">
                <strong className="text-[#a98a66]">7. The Breakup:</strong> "This is the last time you'll receive an email from me. Before we say goodbye, I want to offer [Low-Risk Offer]. Imagine what you can accomplish..."
              </div>
            </div>
          </Accordion>

          <Accordion id="p-call" title="Cold Calling Scripts" subtitle="Direct phone outreach frameworks" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <p className="mb-4">Get straight to the point. Focus on delivering leads or solving an immediate desire.</p>
            <div className="bg-black p-5 rounded border border-gray-800 italic text-gray-300">
              "Hey [Name], are you still selling [Product/Service]? If I had a handful of people who were interested in [Product], who would be the best person to send them to? <br/><br/>
              Full transparency, I'm with The Gentleman of Marketing and based on what you're telling me I think I can send you a ton of qualified leads right now. I know you get calls like this all the time, but I already created an ad for your business that I think will work for you and I'd love to show it to you right now. Is that okay with you? <br/><br/>
              I guarantee it will be worth your time. I'm sending you a link to share my screen. Is [Email] the best address to send it to?"
            </div>
          </Accordion>

          <Accordion id="p-inbound" title="The 'Hand Raiser' Inbound Strategy" subtitle="Frictionless acquisition via social media" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <h4 className="text-white font-medium mb-2">The 1-3 Sentence Rule</h4>
            <p className="text-gray-400 mb-4">If a service cannot be sold in 3 sentences or fewer, no amount of long-form copy will save it. Focus entirely on the "So What?" (The Outcome).</p>
            
            <div className="space-y-4">
              <div className="border-l-2 border-[#a98a66] pl-4">
                <span className="text-xs text-red-400 uppercase tracking-wider block">Service-Led (Wrong)</span>
                <p className="text-gray-300">"Who wants me to run their Google Ads and SEO for emergency plumbing?" (Too much cognitive load)</p>
              </div>
              <div className="border-l-2 border-green-500 pl-4">
                <span className="text-xs text-green-500 uppercase tracking-wider block">Promise-Led (Right)</span>
                <p className="text-gray-300">"Who wants 50-100 calls this month on a $3,000 budget from people needing emergency toilet repair? Drop a comment."</p>
              </div>
            </div>

            <h4 className="text-white font-medium mt-6 mb-2">Curating the Audience</h4>
            <p className="text-gray-400 text-sm">Add 100 niche prospects (e.g., Roofers) in 72 hours. Wait 24 hours for them to settle into your feed. Deploy the Hand Raiser post. Let them "discover" you organically.</p>
          </Accordion>
        </div>
      );

      const renderDiscovery = () => (
        <div className="space-y-2 animate-fadeIn">
          <SectionHeader 
            title="Discovery & Qualification" 
            description="Proper diagnosis precedes prescription. Learn to uncover the true pain." 
          />

          <Accordion id="d-research" title="Pre-Call Prospect Research" subtitle="Information to gather before picking up the phone" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <p className="mb-4">Without background information, your offer lacks context, personalization, and authority. Research is mandatory.</p>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <h4 className="text-[#a98a66] font-semibold mb-2 flex items-center"><i className="ph ph-briefcase mr-2"></i> Company Info</h4>
                <ul className="list-disc pl-5 text-gray-400 text-sm space-y-1">
                  <li>What product/service do they provide?</li>
                  <li>Public or private? Estimated revenue?</li>
                  <li>Leadership structure & decision makers</li>
                  <li>Recent news, product launches, trigger events</li>
                </ul>
              </div>
              <div>
                <h4 className="text-[#a98a66] font-semibold mb-2 flex items-center"><i className="ph ph-users mr-2"></i> Contact Info</h4>
                <ul className="list-disc pl-5 text-gray-400 text-sm space-y-1">
                  <li>Job title and department</li>
                  <li>Level of influence over purchasing</li>
                  <li>Past experience with similar tools/services</li>
                  <li>Specific challenges faced in their role</li>
                </ul>
              </div>
            </div>
          </Accordion>

          <Accordion id="d-questions" title="Asking the Right Questions" subtitle="Present, Past, and Future framing" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <div className="space-y-6">
              <div>
                <h4 className="text-white font-medium border-b border-gray-800 pb-2 mb-3">1. The Present (Current Situation)</h4>
                <ul className="text-gray-400 text-sm space-y-2">
                  <li>"What made you reach out today?"</li>
                  <li>"What challenges are you currently facing?"</li>
                  <li>"If you could change one thing about your business right now, what would it be?"</li>
                </ul>
              </div>
              <div>
                <h4 className="text-white font-medium border-b border-gray-800 pb-2 mb-3">2. The Past (Digging into the Pain)</h4>
                <ul className="text-gray-400 text-sm space-y-2">
                  <li>"What have you tried in the past to fix this problem?"</li>
                  <li>"Of all the things you've done, what was the most successful?"</li>
                  <li>"What has stopped you from hitting your goals?"</li>
                  <li>"When you tried that in the past and it didn't work, why was that?"</li>
                </ul>
              </div>
              <div>
                <h4 className="text-white font-medium border-b border-gray-800 pb-2 mb-3">3. The Future (Painting the Picture)</h4>
                <ul className="text-gray-400 text-sm space-y-2">
                  <li>"What's life going to be like when you have [Goal]?"</li>
                  <li>"How is that going to make you feel?"</li>
                  <li>"Why is now the best time to do this?"</li>
                </ul>
              </div>
            </div>
          </Accordion>

          <Accordion id="d-7layers" title="The 7 Layers of Why" subtitle="Peeling the onion to find the core emotion" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <p className="mb-4 text-gray-300">Money is not the reason people do anything; it is a vehicle. You must ask "Why?" repeatedly to find the emotional core.</p>
            
            <div className="relative border-l-2 border-[#a98a66] pl-6 space-y-4 py-2">
              <div className="relative">
                <div className="absolute -left-[33px] bg-black border-2 border-[#a98a66] w-4 h-4 rounded-full mt-1"></div>
                <span className="text-white font-medium">Layer 1: The Surface Goal</span>
                <p className="text-sm text-gray-500">"I want to make more money."</p>
              </div>
              <div className="relative">
                <div className="absolute -left-[33px] bg-black border-2 border-[#a98a66] w-4 h-4 rounded-full mt-1"></div>
                <span className="text-white font-medium">Layer 2: The Logic</span>
                <p className="text-sm text-gray-500">"Why? So I can save for retirement and have more freedom."</p>
              </div>
              <div className="relative">
                <div className="absolute -left-[33px] bg-black border-2 border-[#a98a66] w-4 h-4 rounded-full mt-1"></div>
                <span className="text-white font-medium">Layer 3: The Personal Impact</span>
                <p className="text-sm text-gray-500">"Why is freedom important? Because I want to take my family on vacation."</p>
              </div>
              <div className="relative">
                <div className="absolute -left-[33px] bg-black border-2 border-[#a98a66] w-4 h-4 rounded-full mt-1"></div>
                <span className="text-[#a98a66] font-medium">Layer 4+: The Deep Emotion</span>
                <p className="text-sm text-gray-400">"Because I promised my wife for years we would go, and never making the time has caused hurt in our relationship. I need to prove I'm not a screw up."</p>
              </div>
            </div>
            <div className="bg-[#111111] p-4 mt-4 border border-gray-800 rounded-sm">
              <p className="text-sm text-gray-300 italic">"If you want someone to take action, the best question to ask is <strong>'Why Now?'</strong>. You have all these challenges, so why are you going to do this right now anyway?"</p>
            </div>
          </Accordion>
        </div>
      );

      const renderClosing = () => (
        <div className="space-y-2 animate-fadeIn">
          <SectionHeader 
            title="Demonstration & Closing" 
            description="Transitioning from diagnosis to prescription and asking for the sale." 
          />

          <Accordion id="c-disarm" title="Disarming Their Guard" subtitle="What to say before and after the demo" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <div className="space-y-4">
              <div className="bg-black p-4 rounded border-l-4 border-gray-500">
                <span className="text-xs text-gray-500 uppercase font-bold tracking-wider">At the Beginning of the Call:</span>
                <p className="text-white mt-2">"I don't even want you to buy today, but let's just gather all the information so you can make an informed decision."</p>
              </div>
              <div className="bg-black p-4 rounded border-l-4 border-[#a98a66]">
                <span className="text-xs text-[#a98a66] uppercase font-bold tracking-wider">After the Demonstration:</span>
                <p className="text-white mt-2">"While you're here, can I just show you the numbers and discuss the different payment options with you?"</p>
              </div>
            </div>
          </Accordion>

          <Accordion id="c-loom" title="The 5-Minute Asynchronous Demo (Loom)" subtitle="Closing without a live sales call" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <p className="mb-4">The traditional hour-long sales call is a bottleneck. Replace it with a 5-minute video that shows the outcome, not the technical process.</p>
            <table className="w-full text-sm text-left border-collapse">
              <thead>
                <tr className="border-b border-gray-800 text-[#a98a66]">
                  <th className="pb-2 font-medium w-1/3">Video Segment</th>
                  <th className="pb-2 font-medium w-2/3">Content Requirement</th>
                </tr>
              </thead>
              <tbody className="text-gray-300">
                <tr className="border-b border-gray-800/50">
                  <td className="py-3 font-medium text-white">1. Tangible Demo</td>
                  <td className="py-3">Visual/audio proof of the actual result (e.g., play a recording of a lead calling to report a broken pipe). Create visceral understanding.</td>
                </tr>
                <tr className="border-b border-gray-800/50">
                  <td className="py-3 font-medium text-white">2. Contextual Price</td>
                  <td className="py-3">Anchor cost directly to result volume. "It's $2,000 against the 50 to 100 phone calls of this type you're going to get."</td>
                </tr>
                <tr className="border-b border-gray-800/50">
                  <td className="py-3 font-medium text-white">3. Payment Guide</td>
                  <td className="py-3">Literal screen-share of the Stripe/payment portal. Eliminate technical friction and show exactly how to buy right now.</td>
                </tr>
                <tr>
                  <td className="py-3 font-medium text-white">4. Direct CTA</td>
                  <td className="py-3">Clear instructions on the next immediate step. Let broke people filter themselves out asynchronously.</td>
                </tr>
              </tbody>
            </table>
          </Accordion>

          <Accordion id="c-ask" title="How to Ask for the Close" subtitle="5 direct closing scripts" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="bg-black p-4 rounded border border-gray-800">
                <span className="text-[#a98a66] font-bold">Close #1:</span>
                <p className="text-white mt-1">"Would you like me to [Service] for $[Price]?"</p>
              </div>
              <div className="bg-black p-4 rounded border border-gray-800">
                <span className="text-[#a98a66] font-bold">Close #2:</span>
                <p className="text-white mt-1">"Which is best for you? You can do 1 payment of $3K, or 2 payments of $1.5K."</p>
              </div>
              <div className="bg-black p-4 rounded border border-gray-800 md:col-span-2">
                <span className="text-[#a98a66] font-bold">Close #3 (The Bleeding):</span>
                <p className="text-white mt-1">"As a result of not having good reviews, how much money do you think that cost you last year? Well, would you like me to stop the bleeding for $1,000?"</p>
              </div>
              <div className="bg-black p-4 rounded border border-gray-800">
                <span className="text-[#a98a66] font-bold">Close #4:</span>
                <p className="text-white mt-1">"Assuming the price is fair, would you like to move forward right now?"</p>
              </div>
              <div className="bg-black p-4 rounded border border-gray-800">
                <span className="text-[#a98a66] font-bold">Close #5:</span>
                <p className="text-white mt-1">"So, do you want to buy it?"</p>
              </div>
            </div>
          </Accordion>
        </div>
      );

      const renderObjections = () => (
        <div className="space-y-2 animate-fadeIn">
          <SectionHeader 
            title="Objection Playbook" 
            description="Sales is a transfer of trust. If they say no, they are saying 'I don't trust you yet.'" 
          />

          <Accordion id="o-process" title="The 6-Step Disarm Process" subtitle="Systematically breaking down resistance" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <ol className="list-decimal pl-5 space-y-3 text-gray-300">
              <li><strong className="text-white">Acknowledge:</strong> Agree to drop defenses. "I'm the same way, I like to talk with my partner too."</li>
              <li><strong className="text-white">Dig:</strong> Ask questions. "So you told me you make the decisions... what's really holding you back?"</li>
              <li><strong className="text-white">Isolate:</strong> Confirm true objection. "Is feeling uncertain about how this works the ONLY thing holding you back?"</li>
              <li><strong className="text-white">Overcome:</strong> Present new info, an alternate truth, or a slice of humble pie.</li>
              <li><strong className="text-white">Vision:</strong> "With this new perspective, how do you think this would change things?"</li>
              <li><strong className="text-[#a98a66]">Ask for the Sale:</strong> "Would you like to work together for the next 3 months?"</li>
            </ol>
          </Accordion>

          <Accordion id="o-flips" title="Flipping Objections" subtitle="Immediate mindset pivots" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <div className="space-y-4">
              <div className="flex flex-col md:flex-row bg-black rounded border border-gray-800 overflow-hidden">
                <div className="md:w-1/2 p-4 bg-[#111111] border-b md:border-b-0 md:border-r border-gray-800 text-gray-400">
                  "I just got to get the money together."
                </div>
                <div className="md:w-1/2 p-4 text-white">
                  "Great! How are you going to get the money together?"
                </div>
              </div>
              <div className="flex flex-col md:flex-row bg-black rounded border border-gray-800 overflow-hidden">
                <div className="md:w-1/2 p-4 bg-[#111111] border-b md:border-b-0 md:border-r border-gray-800 text-gray-400">
                  "I'm not really sure how this will work for me."
                </div>
                <div className="md:w-1/2 p-4 text-white">
                  "Okay, based on our conversation, what made you think it COULD work for you?"
                </div>
              </div>
              <div className="flex flex-col md:flex-row bg-black rounded border border-gray-800 overflow-hidden">
                <div className="md:w-1/2 p-4 bg-[#111111] border-b md:border-b-0 md:border-r border-gray-800 text-gray-400">
                  "I'm in, but I'm not ready today."
                </div>
                <div className="md:w-1/2 p-4 text-white">
                  "Awesome! Why are you in?"
                </div>
              </div>
              <div className="flex flex-col md:flex-row bg-black rounded border border-[#a98a66] overflow-hidden">
                <div className="md:w-1/2 p-4 bg-[#111111] border-b md:border-b-0 md:border-r border-[#a98a66] text-gray-400">
                  "What if it doesn't work?"
                </div>
                <div className="md:w-1/2 p-4 text-[#a98a66] font-bold">
                  "Well, what if it DOES work?"
                </div>
              </div>
            </div>
          </Accordion>

          <Accordion id="o-cards" title="Specific Rebuttal Cards" subtitle="Time, Money, Spouses, Doubt, and Stalls" expanded={expandedAccordion} onToggle={toggleAccordion}>
            <div className="space-y-6">
              <div>
                <h4 className="text-white font-medium border-b border-gray-800 pb-1 mb-2">Time</h4>
                <p className="text-sm text-gray-400 mb-1"><strong className="text-gray-200">"I don't have time."</strong> &rarr; "I understand you're busy, but are you willing to sacrifice for what you want? What activities could you sacrifice to make time for this?"</p>
                <p className="text-sm text-gray-400"><strong className="text-gray-200">"It's bad timing."</strong> &rarr; "I understand why you feel that way, but how did we end up on our call today? What problem were you looking to solve?"</p>
              </div>
              <div>
                <h4 className="text-white font-medium border-b border-gray-800 pb-1 mb-2">Money</h4>
                <p className="text-sm text-gray-400 mb-1"><strong className="text-gray-200">"I can't afford this."</strong> &rarr; "I know this is a big investment for you, but if we could put cost aside, would you move forward today? Why?"</p>
                <p className="text-sm text-gray-400"><strong className="text-gray-200">"It's over budget."</strong> &rarr; "I understand you budget, but when is the last time you went over budget for something you needed? What happened?"</p>
              </div>
              <div>
                <h4 className="text-white font-medium border-b border-gray-800 pb-1 mb-2">Spouse / Partner</h4>
                <p className="text-sm text-gray-400 mb-1"><strong className="text-gray-200">"I need to check with my spouse."</strong> &rarr; "If your partner was on this call in your place, and the roles were reversed, what do you think they would say to you?"</p>
                <p className="text-sm text-gray-400"><strong className="text-gray-200">"I need to talk to my partner."</strong> &rarr; "You told me you believe this will work, will your partner support you in your beliefs and support your decision if you went ahead with it?"</p>
              </div>
              <div>
                <h4 className="text-[#a98a66] font-medium border-b border-[#a98a66]/30 pb-1 mb-2">"I need to think about it"</h4>
                <p className="text-sm text-gray-400 mb-2">"Ok... I understand how you are feeling, I have been here myself. In my case, it’s usually 1 of 3 things:"</p>
                <ol className="text-sm text-gray-300 list-decimal pl-5 space-y-1">
                  <li>I was not on the right product</li>
                  <li>The money or terms were not right for me</li>
                  <li>There are some concerns that were not addressed yet.</li>
                </ol>
                <p className="text-sm text-[#a98a66] mt-2 font-medium">"Which is it for you?"</p>
              </div>
            </div>
          </Accordion>
        </div>
      );

      const renderAITools = () => (
        <div className="space-y-6 animate-fadeIn">
          <SectionHeader 
            title="✨ AI Sales Assistants" 
            description="Leverage the Gemini API to draft high-converting copy and practice objection handling." 
          />

          <div className="bg-[#111111] p-4 border border-gray-800 rounded-sm mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
              <h4 className="text-white text-sm font-medium">Gemini API Key Required</h4>
              <p className="text-xs text-gray-400">To use the AI tools locally, provide your free Gemini API key.</p>
            </div>
            <input
              type="password"
              value={userApiKey}
              onChange={(e) => setUserApiKey(e.target.value)}
              className="bg-black border border-gray-800 rounded-sm p-2 text-white text-sm focus:outline-none focus:border-[#a98a66] transition-colors md:w-64"
              placeholder="Paste API Key here..."
            />
          </div>

          <div className="flex space-x-4 mb-8 border-b border-gray-800 pb-4">
            <button
              onClick={() => { setAiMode('post'); setAiResult(''); }}
              className={`flex items-center px-4 py-2 rounded-sm transition-colors ${aiMode === 'post' ? 'bg-[#a98a66] text-black font-semibold' : 'bg-transparent text-gray-400 hover:text-white'}`}
            >
              <i className="ph ph-pen-nib mr-2 text-lg"></i> Hand-Raiser Post Gen
            </button>
            <button
              onClick={() => { setAiMode('roleplay'); setAiResult(''); }}
              className={`flex items-center px-4 py-2 rounded-sm transition-colors ${aiMode === 'roleplay' ? 'bg-[#a98a66] text-black font-semibold' : 'bg-transparent text-gray-400 hover:text-white'}`}
            >
              <i className="ph ph-robot mr-2 text-lg"></i> Objection Simulator
            </button>
          </div>

          {aiMode === 'post' && (
            <div className="bg-[#111111] p-6 border border-gray-800 rounded-sm">
              <h3 className="text-xl text-white mb-2">Generate 'Hand Raiser' Posts</h3>
              <p className="text-gray-400 mb-6 text-sm">Input your target niche and the outcome you deliver. Gemini will generate 3 punchy, 1-3 sentence posts designed to elicit high-intent signals.</p>

              <div className="space-y-4 mb-6">
                <div>
                  <label className="block text-gray-400 text-sm mb-1">Target Audience (e.g., Roofers, Dentists)</label>
                  <input
                    type="text"
                    value={targetAudience}
                    onChange={(e) => setTargetAudience(e.target.value)}
                    className="w-full bg-black border border-gray-800 rounded-sm p-3 text-white focus:outline-none focus:border-[#a98a66] transition-colors"
                    placeholder="e.g. HVAC Contractors"
                  />
                </div>
                <div>
                  <label className="block text-gray-400 text-sm mb-1">Desired Outcome (e.g., 50-100 emergency calls)</label>
                  <input
                    type="text"
                    value={desiredOutcome}
                    onChange={(e) => setDesiredOutcome(e.target.value)}
                    className="w-full bg-black border border-gray-800 rounded-sm p-3 text-white focus:outline-none focus:border-[#a98a66] transition-colors"
                    placeholder="e.g. 20 new high-ticket installations this month"
                  />
                </div>
              </div>

              <button
                onClick={handleGeneratePost}
                disabled={isLoading || !targetAudience || !desiredOutcome}
                className="w-full bg-black hover:bg-[#1a1a1a] border border-[#a98a66] text-[#a98a66] font-semibold py-3 rounded-sm transition-colors disabled:opacity-50 disabled:border-gray-800 disabled:text-gray-600 flex justify-center items-center"
              >
                {isLoading ? <i className="ph ph-spinner ph-spin mr-2 text-lg"></i> : <i className="ph ph-sparkle mr-2 text-lg"></i>}
                ✨ Generate Posts
              </button>
            </div>
          )}

          {aiMode === 'roleplay' && (
            <div className="bg-[#111111] p-6 border border-gray-800 rounded-sm">
              <h3 className="text-xl text-white mb-2">Objection Handling Simulator</h3>
              <p className="text-gray-400 mb-6 text-sm">Type an objection you heard on a call, and your planned response. Gemini will evaluate your rebuttal against the 6-Step Disarm Process.</p>

              <div className="space-y-4 mb-6">
                <div>
                  <label className="block text-gray-400 text-sm mb-1">Prospect's Objection</label>
                  <input
                    type="text"
                    value={objection}
                    onChange={(e) => setObjection(e.target.value)}
                    className="w-full bg-black border border-gray-800 rounded-sm p-3 text-white focus:outline-none focus:border-[#a98a66] transition-colors"
                    placeholder="e.g. I need to talk to my business partner first."
                  />
                </div>
                <div>
                  <label className="block text-gray-400 text-sm mb-1">Your Rebuttal</label>
                  <textarea
                    value={rebuttal}
                    onChange={(e) => setRebuttal(e.target.value)}
                    rows="3"
                    className="w-full bg-black border border-gray-800 rounded-sm p-3 text-white focus:outline-none focus:border-[#a98a66] transition-colors resize-none"
                    placeholder="e.g. Okay, well what if they say no?"
                  ></textarea>
                </div>
              </div>

              <button
                onClick={handleAnalyzeRebuttal}
                disabled={isLoading || !objection || !rebuttal}
                className="w-full bg-black hover:bg-[#1a1a1a] border border-[#a98a66] text-[#a98a66] font-semibold py-3 rounded-sm transition-colors disabled:opacity-50 disabled:border-gray-800 disabled:text-gray-600 flex justify-center items-center"
              >
                {isLoading ? <i className="ph ph-spinner ph-spin mr-2 text-lg"></i> : <i className="ph ph-sparkle mr-2 text-lg"></i>}
                ✨ Analyze Rebuttal
              </button>
            </div>
          )}

          {aiResult && (
            <div className="bg-black p-6 border border-[#a98a66]/50 rounded-sm animate-fadeIn whitespace-pre-wrap text-gray-300 leading-relaxed">
               {aiResult}
            </div>
          )}
        </div>
      );

      return (
        <div className="min-h-screen bg-black text-white font-sans flex flex-col md:flex-row">
          {/* Sidebar Navigation */}
          <nav className="w-full md:w-64 bg-[#0a0a0a] border-r border-gray-800 flex-shrink-0 flex flex-col">
            <div className="p-6 border-b border-gray-800">
              <h1 className="text-xl font-bold uppercase tracking-widest text-white leading-tight">
                The Gentleman <br/>
                <span className="text-[#a98a66] text-sm">Of Marketing</span>
              </h1>
              <p className="text-xs text-gray-500 mt-2 uppercase tracking-wider">Playbook & Dashboard</p>
            </div>
            
            <div className="flex-1 py-4 flex flex-col gap-1 overflow-y-auto">
              <NavItem id="overview" icon="ph ph-book-open" label="The Foundation" />
              <NavItem id="prospecting" icon="ph ph-magnifying-glass" label="Prospecting" />
              <NavItem id="discovery" icon="ph ph-crosshair" label="Discovery" />
              <NavItem id="closing" icon="ph ph-monitor-play" label="Demo & Closing" />
              <NavItem id="objections" icon="ph ph-warning" label="Objections" />
              <NavItem id="ai-tools" icon="ph ph-sparkle" label="✨ AI Tools" />
            </div>

            <div className="p-6 border-t border-gray-800 text-xs text-gray-600 text-center uppercase tracking-widest">
              Sell with Integrity
            </div>
          </nav>

          {/* Main Content Area */}
          <main className="flex-1 p-6 md:p-10 lg:p-12 overflow-y-auto h-screen">
            <div className="max-w-4xl mx-auto">
              {activeTab === 'overview' && renderOverview()}
              {activeTab === 'prospecting' && renderProspecting()}
              {activeTab === 'discovery' && renderDiscovery()}
              {activeTab === 'closing' && renderClosing()}
              {activeTab === 'objections' && renderObjections()}
              {activeTab === 'ai-tools' && renderAITools()}
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
